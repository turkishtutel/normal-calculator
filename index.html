<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>calc nesuspicios</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>

<button id="changelogBtn">CHANGELOG V1.3</button>

<div class="modal-overlay" id="modalOverlay"></div>

<div class="changelog-frame" id="changelogFrame">
    <div class="changelog-header">CHANGELOGUL PENTRU V1.3</div>
    <div class="changelog-body">
        <p>• Nu mai este tema de craciun</p>
        <p>• Am scos muzica de craciun</p>
        <p>• AI: Gemini</p>
        <p>• Am scos countdown-ul</p>
    </div>
</div>

<button id="themeToggle" class="theme">🌞</button>

<div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button onclick="press('/')" class="operator">÷</button>
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="press('*')" class="operator">×</button>
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button onclick="press('-')" class="operator">−</button>
        <button onclick="press('0')">0</button>
        <button onclick="press('.')">.</button>
        <button onclick="calculate()" class="operator">=</button>
        <button onclick="press('+')" class="operator">+</button>
        <button id="clear" onclick="clearDisplay()">Clear</button>
        <button id="toggleTitle" onclick="toggleTitle()">🕒</button>
    </div>
</div>

<button class="robot-btn" onclick="toggleAIFrame()">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712015.png" alt="Robot">
</button>

<div class="ai-frame" id="aiFrame">
    <div class="ai-header">
        <button onclick="clearChat()" style="background:none; border:none; cursor:pointer; font-size:13px; color:inherit; padding:0 6px;">🔄</button>
        AI SUPPORT
        <span style="width:25px;"></span>
    </div>
    <div class="ai-body" id="aiBody"></div>
    <textarea class="ai-textbox" id="aiInput" placeholder="Type your message..."></textarea>
</div>

<script src="src.js"></script>
</body>
</html>
